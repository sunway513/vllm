name: Sync Fork

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily (before dashboard collection at 8am)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        run: gh repo sync "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
